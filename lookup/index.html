 "31-35":[0.94,0.96],"36-40":[0.87,0.91],"41-45":[0.80,0.86],"46-50":[0.71,0.82],
 "51-55":[0.62,0.76],"56-60":[0.51,0.70],"61-65":[null,0.65],"66-70":[null,0.57],"71-75":[null,0.49],"76-80":[null,0.41]};
const T58={"2":[.80,.85],"3":[.70,.79],"4":[.65,.75],"5":[.60,.73],"6":[.57,.72],"7":[.54,.72],
 "8":[.52,.71],"9":[.50,.70],"10-12":[.45,.70],"13-16":[.41,.70],"17-20":[.38,.70]};

const DATA={
 conduit_air:{grp:1,label:"ในท่อ · ในอากาศ"},conduit_wall:{grp:2,label:"ในท่อ · ฝังผนัง/คอนกรีต"},
 surface:{grp:3,label:"เกาะผนัง · ในอากาศ"},insulator:{grp:4,label:"บนลูกถ้วย · ในอากาศ"},
 conduit_buried:{grp:5,label:"ในท่อ · ฝังดิน"},direct_buried:{grp:6,label:"ฝังดินโดยตรง"},tray:{grp:7,label:"บนราง"}};
const BURIED_M=m=>m==="conduit_buried"||m==="direct_buried";
const GROUPABLE=m=>["conduit_air","conduit_wall","surface"].includes(m);

const state={ins:"PVC",method:"conduit_air",tray:"vent_nocover",arr:"1",core:"s",cond:"2",size:"95",amb:"36-40",grpN:"1"};

function currentRows(){
 const m=state.method,i=state.ins;
 if(m==="conduit_air"||m==="conduit_wall")return CONDUIT[i].rows;
 if(m==="surface")return SURFACE[i].rows;
 if(m==="conduit_buried"||m==="direct_buried")return BURIED[i].rows;
 if(m==="insulator")return (INSUL[i]||INSUL.PVC).rows;
 if(m==="tray")return TRAY[i][state.tray].rows;
}
function lookup(){
 const m=state.method,i=state.ins,sz=state.size; let base,table,amb=BURIED_M(m)?30:40;
 if(m==="conduit_air"||m==="conduit_wall"){const t=CONDUIT[i];table=t.table;const r=t.rows[sz];
   const g=(m==="conduit_air")?1:2;base=r?r[(g-1)*4+(state.cond==="3"?2:0)+(state.core==="m"?1:0)]:undefined;}
 else if(m==="surface"){const t=SURFACE[i];table=t.table;const r=t.rows[sz];
   base=r?r[(state.cond==="3"?2:0)+(state.core==="m"?1:0)]:undefined;}
 else if(m==="conduit_buried"){const t=BURIED[i];table=t.table;const r=t.rows[sz];base=r?(state.cond==="3"?r[1]:r[0]):undefined;}
 else if(m==="direct_buried"){const t=BURIED[i];table=t.table;const r=t.rows[sz];base=r?r[2]:undefined;}
 else if(m==="insulator"){const t=INSUL[i]||INSUL.PVC;table=t.table;const r=t.rows[sz];base=r?r[state.arr==="2"?1:0]:undefined;}
 else if(m==="tray"){const t=TRAY[i][state.tray];table=t.table;const r=t.rows[sz];
   base=r?r[(state.cond==="3"?2:0)+(state.core==="m"?1:0)]:undefined;}
 return {base,table,amb};
}

function render(){
 const {base,table,amb}=lookup(),M=DATA[state.method];
 const R=document.getElementById("result"),co=document.getElementById("corrOut"),cn=document.getElementById("corrNote");
 const insLbl=state.ins==="Al"?"Al · PVC 70°C":(state.ins+" · "+(state.ins==="XLPE"?90:70)+"°C");
 let ctx=M.label; if(state.method==="tray")ctx=TRAY_LBL[state.tray];
 if(state.method==="insulator")ctx=M.label+" · รูปแบบที่ "+state.arr;
 const coreLbl=state.core==="s"?"แกนเดียว":"หลายแกน",condLbl=state.cond+" เส้น";

 if(state.method==="tray"&&state.core==="s"&&(+state.size<25)){
   R.className="result warn";
   R.innerHTML='<div class="big">แกนเดียวต้อง ≥ 25 ตร.มม.</div><div class="meta">ข้อ 5.15.1.1 ข — สายแกนเดียวบนรางเคเบิลต้องไม่เล็กกว่า 25 ตร.มม.</div>';
   co.innerHTML="";cn.textContent="";return;}
 if(state.method==="tray"&&state.tray==="vent_nocover"&&state.core==="s"&&base==null){
   R.className="result warn";
   R.innerHTML=`<div class="big">ระบุรูปแบบการวางสาย</div><div class="meta">${insLbl} · ${ctx}<br>สายแกนเดียวบนรางไม่มีฝา ค่าขึ้นกับการวาง (ชิด/สามเหลี่ยม/ห่าง) — เปิดตาราง ${table} โดยตรง หรือเลือก "หลายแกน"</div><span class="src">ตาราง ${table}</span>`;
   co.innerHTML="";cn.textContent="";return;}
 if(base==null){
   R.className="result empty";
   R.innerHTML=`<div class="big">ไม่มีค่าในตาราง</div><div class="meta">${state.size} ตร.มม. เงื่อนไขนี้ไม่ได้ระบุไว้ในตาราง ${table}</div>`;
   co.innerHTML="";cn.textContent="";return;}
 R.className="result";
 let extra="",detail;
 if(state.method==="insulator"){const o=(INSUL[state.ins]||INSUL.PVC).rows[state.size];
   if(o)extra=`<br>อีกรูปแบบ (แบบที่ ${state.arr==="1"?2:1}): ${o[state.arr==="1"?1:0]} A`;detail=state.size+" ตร.มม. · แกนเดียว";}
 else if(state.method==="direct_buried"){extra="<br>ค่าใช้กับตัวนำไม่เกิน 3 เส้น";detail=state.size+" ตร.มม.";}
 else detail=state.size+" ตร.มม. · "+coreLbl+" · "+condLbl;
 R.innerHTML=`<div class="big">${base}<small>A</small></div><div class="meta">${insLbl} · ${ctx}<br>${detail} · อ้างอิง ${amb}°C${extra}</div><span class="src">ตาราง ${table}</span>`;

 const tblA=BURIED_M(state.method)?T544:T543,insCol=state.ins==="XLPE"?1:0;
 const ca=tblA[state.amb]?tblA[state.amb][insCol]:null;
 const gEn=GROUPABLE(state.method);
 const cg=(!gEn||state.grpN==="1")?1:(state.method==="surface"?T58[state.grpN][1]:T58[state.grpN][0]);
 if(ca==null){co.innerHTML=`<div class="corr"><span>Ca อุณหภูมิ ${state.amb}°C</span><span class="fx">ไม่มีค่า</span></div>`;cn.textContent="";return;}
 const iz=Math.round(base*ca*cg*10)/10;
 co.innerHTML=`<div class="corr"><span>ค่าฐาน</span><span class="val">${base} A</span></div>
   <div class="corr"><span>Ca · อุณหภูมิ ${state.amb}°C</span><span class="fx">× ${ca.toFixed(2)}</span></div>
   <div class="corr"><span>Cg · ${gEn?(state.grpN+" กลุ่มวงจร"):"—"}</span><span class="fx">× ${cg.toFixed(2)}</span></div>
   <div class="final"><span>Iz (ปรับค่าแล้ว)</span><b>${iz} A</b></div>`;
 cn.textContent = gEn ? "Iz = ค่าฐาน × Ca × Cg — เทียบ IB ≤ IN ≤ Iz ต่อในโมดูล เบรกเกอร์ & ขนาดสาย"
   : BURIED_M(state.method) ? "ใต้ดินหลายวงจร: ตัวคูณกลุ่มใช้ตาราง 5-45/5-46 (ยังไม่รวม) — Iz นี้ปรับเฉพาะอุณหภูมิ"
   : state.method==="tray" ? "บนราง: ตัวคูณกลุ่มวงจรใช้ตาราง 5-40/5-41 (ยังไม่รวม) — Iz นี้ปรับเฉพาะอุณหภูมิ"
   : "เดินเปิดบนลูกถ้วย: ระยะห่างตามตาราง 5-4/5-5 — Iz นี้ปรับเฉพาะอุณหภูมิ";
}

/* ---- UI sync ---- */
function setSeg(id,v){document.querySelectorAll("#"+id+" button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));}
function fillSizes(){const sel=document.getElementById("size"),rows=currentRows(),keep=state.size;sel.innerHTML="";
 Object.keys(rows).forEach(sz=>{const o=document.createElement("option");o.value=sz;o.textContent=sz;sel.appendChild(o);});
 if(rows[keep]===undefined)state.size=(rows["95"]!==undefined?"95":Object.keys(rows)[Math.floor(Object.keys(rows).length/2)]);
 sel.value=state.size;}
function fillAmb(){const isB=BURIED_M(state.method),tbl=isB?T544:T543,a=document.getElementById("amb");
 a.innerHTML=Object.keys(tbl).map(k=>`<option value="${k}">${k} °C</option>`).join("");
 if(!tbl[state.amb])state.amb=isB?"26-30":"36-40";a.value=state.amb;
 document.getElementById("amb-lbl").textContent="อุณหภูมิโดยรอบ (ตาราง "+(isB?"5-44 · ฐาน 30°C":"5-43 · ฐาน 40°C")+")";}
function syncUI(){
 setSeg("seg-ins",state.ins);setSeg("seg-tray",state.tray);setSeg("seg-arr",state.arr);
 setSeg("seg-core",state.core);setSeg("seg-cond",state.cond);
 document.getElementById("method").value=state.method;
 const m=state.method;
 document.getElementById("btn-al").classList.toggle("hidden",m!=="insulator");
 document.getElementById("tray-fld").classList.toggle("hidden",m!=="tray");
 document.getElementById("arr-fld").classList.toggle("hidden",m!=="insulator");
 document.getElementById("core-fld").classList.toggle("hidden",["insulator","conduit_buried","direct_buried"].includes(m));
 document.getElementById("cond-fld").classList.toggle("hidden",["insulator","direct_buried"].includes(m));
 fillSizes();fillAmb();
 const g=document.getElementById("grpN"),gEn=GROUPABLE(m);g.disabled=!gEn;if(!gEn){state.grpN="1";}g.value=state.grpN;
}
function seg(id,key,extra){document.querySelectorAll("#"+id+" button").forEach(b=>b.onclick=()=>{state[key]=b.dataset.v;extra&&extra();syncUI();render();});}
seg("seg-ins","ins");seg("seg-tray","tray");seg("seg-arr","arr");seg("seg-core","core");seg("seg-cond","cond");
document.getElementById("method").onchange=e=>{state.method=e.target.value;
 if(state.method!=="insulator"&&state.ins==="Al")state.ins="PVC";
 if(state.method==="insulator")state.core="s";
 syncUI();render();};
document.getElementById("size").onchange=e=>{state.size=e.target.value;render();};
(function(){const g=document.getElementById("grpN");
 g.innerHTML=`<option value="1">1 (ไม่ปรับ)</option>`+Object.keys(T58).map(k=>`<option value="${k}">${k}</option>`).join("");
 g.onchange=e=>{state.grpN=e.target.value;render();};
 document.getElementById("amb").onchange=e=>{state.amb=e.target.value;render();};})();

/* ---- ตารางอ้างอิง ---- */
const TABLES=[
 {no:"5-1",title:"ความลึกฝังดินต่ำสุด",sub:"เมตร · ตามวิธีเดินสาย",kw:"ฝังดิน ความลึก burial depth hdpe pvc",
  head:["วิธีการเดินสาย","ทั่วไป","ใต้คอนกรีต","ใต้พื้น"],rows:[["สายฝังดินโดยตรง","0.60","0.45","0.45"],["ท่อโลหะหนา/หนาปานกลาง","0.15","0.15","0.10"],["ท่ออโลหะ (HDPE/RTRC/PVC)","0.45","0.30","0.10"],["ท่อรอยสายอื่น","0.45","0.30","0.10"]],note:"รถวิ่งผ่าน ≥ 0.60 ม. · ใต้อาคารไม่บังคับ"},
 {no:"5-2",title:"ระยะจับยึดสายแนวดิ่ง",sub:"เมตร",kw:"จับยึด แนวดิ่ง vertical",head:["ขนาดสาย (ตร.มม.)","สูงสุด (ม.)"],rows:[["ไม่เกิน 50","30"],["70–120","24"],["150–185","18"],["240","15"],["300","12"],["เกิน 300","10"]]},
 {no:"5-3",title:"พื้นที่หน้าตัดสาย · ร้อยละของท่อ",sub:"conduit fill",kw:"conduit fill พื้นที่ท่อ 53 31 40",head:["ชนิดสาย","1","2","3","4",">4"],rows:[["ทุกชนิด (ยกเว้นปลอกตะกั่ว)","53","31","40","40","40"],["มีปลอกตะกั่ว","55","30","40","38","35"]]},
 {no:"5-8",title:"ตัวคูณ · จำนวนกลุ่มวงจร (ท่อ/ผิว)",sub:"derating",kw:"derating grouping กลุ่มวงจร ท่อ",head:["กลุ่มวงจร","ในช่องเดียวกัน","บนผิว"],rows:Object.entries(T58).map(([k,v])=>[k,v[0].toFixed(2),v[1].toFixed(2)]),note:"บนราง→5-40/5-41 · ใต้ดิน→5-45/5-46"},
 {no:"5-43",title:"ตัวคูณอุณหภูมิ · ในอากาศ",sub:"ฐาน 40°C",kw:"ambient อุณหภูมิ อากาศ 5-43",head:["°C","PVC 70","XLPE 90"],rows:Object.entries(T543).map(([k,v])=>[k,v[0]==null?"–":v[0].toFixed(2),v[1].toFixed(2)])},
 {no:"5-44",title:"ตัวคูณอุณหภูมิ · ใต้ดิน",sub:"ฐาน 30°C",kw:"ambient อุณหภูมิ ใต้ดิน ฝังดิน 5-44",head:["°C","PVC 70","XLPE 90"],rows:Object.entries(T544).map(([k,v])=>[k,v[0]==null?"–":v[0].toFixed(2),v[1].toFixed(2)])},
 {no:"กลุ่ม 1-7",title:"สรุปตารางขนาดกระแสที่ใช้",sub:"อ้างอิง วสท. บทที่ 5",kw:"กลุ่ม ตาราง ขนาดกระแส 5-20 5-21 5-22 5-23 5-27 5-28 5-29 5-30",head:["กลุ่ม","วิธีเดินสาย","PVC","XLPE"],rows:[["1–2","ในท่อ (อากาศ/ฝังผนัง)","5-20","5-27"],["3","เกาะผนังในอากาศ","5-21","5-21"],["4","บนลูกถ้วย (แกนเดียว)","5-22","5-28"],["5–6","ในท่อฝังดิน/ฝังตรง","5-23","5-29"],["7","รางเคเบิล","5-30–31","5-32–33"],["4 (Al)","ลูกถ้วย อะลูมิเนียม","5-42","—"]]}
];
(function(){const w=document.getElementById("browse");
 w.innerHTML=TABLES.map(t=>`<div class="card browse-item" data-kw="${t.no} ${t.title} ${t.kw}">
   <div class="browse-head"><div><span class="no">ตาราง ${t.no}</span><div class="tt">${t.title}</div><div class="sub">${t.sub}</div></div>
   <svg class="chev" width="18" height="18" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none"/></svg></div>
   <div class="browse-body"><table><thead><tr>${t.head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>${t.note?`<div class="note">${t.note}</div>`:""}</div></div>`).join("");
 w.querySelectorAll(".browse-head").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));})();

function showTab(n){document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.tab===n));
 document.getElementById("finder").classList.toggle("hidden",n!=="finder");
 document.getElementById("browse").classList.toggle("hidden",n!=="browse");}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showTab(t.dataset.tab));

/* ---- smart search ---- */
function validSize(sz){return currentRows()[sz]!==undefined;}
function parseQuery(raw){const t=raw.toLowerCase(),p={};let route=false;
 if(/xlpe/.test(t))p.ins="XLPE";if(/pvc/.test(t))p.ins="PVC";if(/(อะลู|aluminium|aluminum|\bal\b)/.test(t))p.ins="Al";
 if(/(ฝังดินโดยตรง|direct)/.test(t)){p.method="direct_buried";route=true;}
 else if(/(ฝังดิน|ใต้ดิน|buried)/.test(t)){p.method="conduit_buried";route=true;}
 else if(/(ลูกถ้วย|insulator|เดินลอย|เปิดโล่ง)/.test(t)){p.method="insulator";p.core="s";route=true;}
 else if(/(ราง|tray|ladder|บันได|ระบาย)/.test(t)){p.method="tray";route=true;
   p.tray=/(มีฝา|cover|ฝาปิด)/.test(t)?"cover":(/(ทึบ|solid)/.test(t)?"solid_nocover":"vent_nocover");
   if(!/(แกนเดียว|single)/.test(t))p.core="m";}
 else if(/(เกาะผนัง|surface|บนผิว)/.test(t)){p.method="surface";route=true;}
 else if(/(ท่อ|conduit)/.test(t)){p.method=/(ผนัง|concrete|wall|คอนกรีต)/.test(t)?"conduit_wall":"conduit_air";route=true;}
 if(/(แกนเดียว|single)/.test(t))p.core="s";if(/(หลายแกน|multi)/.test(t))p.core="m";
 if(/(3\s*(เฟส|phase|ph|φ)|สามเฟส|3p\b)/.test(t))p.cond="3";
 if(/(1\s*(เฟส|phase|ph|φ)|เฟสเดียว|1p\b)/.test(t))p.cond="2";
 let m=t.match(/(\d+(?:\.\d+)?)\s*(?:sq|ตร|mm|มม)/);if(!m)m=t.match(/(?:^|\s)(\d{1,3}(?:\.\d)?)(?:\s|$)/);
 return {p,route,sizeTok:m?m[1]:null};}
document.getElementById("q").addEventListener("input",e=>{
 const raw=e.target.value.trim();
 if(!raw){document.getElementById("banner").classList.remove("on");
  document.querySelectorAll(".browse-item").forEach(i=>i.classList.remove("hidden"));
  document.getElementById("noResult").classList.add("hidden");return;}
 const {p,route,sizeTok}=parseQuery(raw);Object.assign(state,p);
 if(state.method!=="insulator"&&state.ins==="Al")state.ins="PVC";
 syncUI();
 if(sizeTok&&validSize(sizeTok)){state.size=sizeTok;document.getElementById("size").value=sizeTok;}
 if(route||(sizeTok&&validSize(sizeTok))){
  showTab("finder");render();const {base,table}=lookup();
  const b=document.getElementById("banner");b.classList.add("on");
  let ctx=DATA[state.method].label;if(state.method==="tray")ctx=TRAY_LBL[state.tray];
  b.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg><span>ผลจากคำค้น: <b>${state.size} ตร.มม.</b> · ${state.ins} · ${ctx}${base!=null?" → <b>"+base+" A</b>":""} <span style="opacity:.7">(ตาราง ${table})</span></span>`;
 } else {
  document.getElementById("banner").classList.remove("on");showTab("browse");
  const toks=raw.toLowerCase().split(/\s+/).filter(x=>x.length>=2);let hits=0;
  document.querySelectorAll(".browse-item").forEach(i=>{const mm=toks.some(x=>i.dataset.kw.toLowerCase().includes(x));
   i.classList.toggle("hidden",!mm);if(mm){hits++;i.classList.add("open");}});
  document.getElementById("noResult").classList.toggle("hidden",hits>0);}
});

syncUI();render();
</script>
