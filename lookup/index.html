  head:["อุณหภูมิรอบ (°C)","PVC 70°C","XLPE 90°C"],rows:Object.entries(T543).map(([k,v])=>[k,v[0]==null?"–":v[0].toFixed(2),v[1].toFixed(2)])},
 {no:"5.15.1",title:"เงื่อนไขวางสายบนรางเคเบิล",sub:"ข้อกำหนดสำคัญ · กลุ่มที่ 7",kw:"ราง cable tray ladder รางเคเบิล เงื่อนไข แกนเดียว 25",
  head:["ข้อ","เงื่อนไข"],rows:[
   ["5.15.1.1 ข","สายแกนเดียวบนรางต้องขนาด ≥ 25 ตร.มม."],
   ["5.15.3.5","สายแกนเดียว: สายเส้นไฟ+นิวทรัลของแต่ละวงจรต้องรวมกลุ่ม + มัดเข้าด้วยกัน"],
   ["5.15.1.4","สายโดนแดดโดยตรงต้องเป็นชนิดทนแสงแดด"],
   ["5.15.8","รางโลหะต้องต่อลงดิน แต่ห้ามใช้รางเป็นตัวนำต่อลงดิน"]],
  note:"ค่าขนาดกระแส: ตาราง 5-30 ถึง 5-33 (แรงต่ำ), 5-34/5-35 (เอ็มไอ), 5-36/5-37 (แรงสูง)"}
];

const state={ins:"PVC",grp:"1",tray:"vent_nocover",core:"s",cond:"2",size:"95",amb:"36-40",grpN:"1"};

/* ---- ดึงค่าฐาน ---- */
function getBase(){
  if(state.grp==="7"){
    const t=TRAY[state.ins][state.tray], row=t.rows[state.size];
    const i=(state.cond==="3"?2:0)+(state.core==="m"?1:0);
    const base=row?row[i]:undefined;
    const arrangeNote=(state.tray==="vent_nocover"&&state.core==="s"); // ต้องระบุรูปแบบวาง
    return {base,table:t.table,arrangeNote,ctx:TRAY_LBL[state.tray]};
  }
  const t=CONDUIT[state.ins], row=t.rows[state.size];
  const i=(+state.grp-1)*4+(state.cond==="3"?2:0)+(state.core==="m"?1:0);
  return {base:row?row[i]:undefined,table:t.table,arrangeNote:false,
          ctx:(state.grp==="1"?"ในท่อ · ในอากาศ":"ในท่อ · ฝังผนัง/คอนกรีต")};
}

function render(){
  const {base,table,arrangeNote,ctx}=getBase();
  const R=document.getElementById("result");
  const coreLbl=state.core==="s"?"แกนเดียว":"หลายแกน", condLbl=state.cond+" เส้น";
  const insLbl=state.ins+" · "+(state.ins==="PVC"?70:90)+"°C";
  const co=document.getElementById("corrOut"), cn=document.getElementById("corrNote");

  if(state.grp==="7"&&state.core==="s"&&(+state.size<25)){
    R.className="result warn";
    R.innerHTML=`<div class="big">แกนเดียวต้อง ≥ 25 ตร.มม.</div>
      <div class="meta">ข้อ 5.15.1.1 ข — สายแกนเดียวบนรางเคเบิลต้องไม่เล็กกว่า 25 ตร.มม.</div>`;
    co.innerHTML="";cn.textContent="";return;
  }
  if(arrangeNote&&base==null){
    R.className="result warn";
    R.innerHTML=`<div class="big">ระบุรูปแบบการวางสาย</div>
      <div class="meta">${insLbl} · ${ctx}<br>สายแกนเดียวบนรางไม่มีฝา ค่าขึ้นกับการวาง (ชิด / สามเหลี่ยม / ห่าง) — เปิดตาราง ${table} โดยตรง<br>หรือเลือก "หลายแกน" เพื่อดูค่าที่คำนวณให้ได้</div>
      <span class="src">ตาราง ${table}</span>`;
    co.innerHTML="";cn.textContent="";return;
  }
  if(base==null){
    R.className="result empty";
    R.innerHTML=`<div class="big">ไม่มีค่าในตาราง</div>
      <div class="meta">${state.size} ตร.มม. · ${coreLbl} · ${condLbl} ไม่ได้ระบุไว้ในตาราง ${table}</div>`;
    co.innerHTML="";cn.textContent="";return;
  }
  R.className="result";
  R.innerHTML=`<div class="big">${base}<small>A</small></div>
    <div class="meta">${insLbl} · ${ctx}<br>${state.size} ตร.มม. · ${coreLbl} · ${condLbl} · อ้างอิง 40°C</div>
    <span class="src">ตาราง ${table}</span>`;

  const ca=T543[state.amb][state.ins==="PVC"?0:1];
  const trayMode=(state.grp==="7");
  const cg=(state.grpN==="1"||trayMode)?1:T58[state.grpN][0];
  if(ca==null){co.innerHTML=`<div class="corr"><span>Ca อุณหภูมิ ${state.amb}°C</span><span class="fx">ไม่มีค่า (PVC)</span></div>`;cn.textContent="";return;}
  const iz=Math.round(base*ca*cg*10)/10;
  co.innerHTML=`
    <div class="corr"><span>ค่าฐาน</span><span class="val">${base} A</span></div>
    <div class="corr"><span>Ca · อุณหภูมิ ${state.amb}°C</span><span class="fx">× ${ca.toFixed(2)}</span></div>
    <div class="corr"><span>Cg · ${trayMode?"—":state.grpN+" กลุ่มวงจร"}</span><span class="fx">× ${cg.toFixed(2)}</span></div>
    <div class="final"><span>Iz (ปรับค่าแล้ว)</span><b>${iz} A</b></div>`;
  cn.textContent=trayMode
    ? "บนราง: ตัวคูณจำนวนกลุ่มวงจรใช้ตาราง 5-40/5-41 (ยังไม่รวมในตัวคำนวณนี้) — ค่า Iz นี้ปรับเฉพาะอุณหภูมิ"
    : "Iz = ค่าฐาน × Ca × Cg — เทียบ IB ≤ IN ≤ Iz ต่อในโมดูล เบรกเกอร์ & ขนาดสาย";
}

/* ---- sync UI จาก state ---- */
function setSeg(id,val){document.querySelectorAll("#"+id+" button").forEach(b=>b.classList.toggle("on",b.dataset.v===val));}
function fillSizes(){
  const sel=document.getElementById("size");
  const rows=(state.grp==="7"?TRAY[state.ins][state.tray]:CONDUIT[state.ins]).rows;
  const keep=state.size; sel.innerHTML="";
  Object.keys(rows).forEach(sz=>{const o=document.createElement("option");o.value=sz;o.textContent=sz;sel.appendChild(o);});
  if(rows[keep]===undefined)state.size="95"; sel.value=state.size;
}
function syncUI(){
  setSeg("seg-ins",state.ins);setSeg("seg-grp",state.grp);setSeg("seg-tray",state.tray);
  setSeg("seg-core",state.core);setSeg("seg-cond",state.cond);
  document.getElementById("tray-fld").classList.toggle("hidden",state.grp!=="7");
  fillSizes();
  document.getElementById("amb").value=state.amb;
  const g=document.getElementById("grpN"); g.value=state.grpN; g.disabled=(state.grp==="7");
}

/* ---- wiring ---- */
function seg(id,key,extra){document.querySelectorAll("#"+id+" button").forEach(b=>b.onclick=()=>{state[key]=b.dataset.v;extra&&extra();syncUI();render();});}
seg("seg-ins","ins");seg("seg-grp","grp");seg("seg-tray","tray");seg("seg-core","core");seg("seg-cond","cond");
document.getElementById("size").onchange=e=>{state.size=e.target.value;render();};
(function(){const a=document.getElementById("amb");a.innerHTML=Object.keys(T543).map(k=>`<option value="${k}">${k} °C</option>`).join("");
  a.onchange=e=>{state.amb=e.target.value;render();};
  const g=document.getElementById("grpN");g.innerHTML=`<option value="1">1 (ไม่ปรับ)</option>`+Object.keys(T58).map(k=>`<option value="${k}">${k}</option>`).join("");
  g.onchange=e=>{state.grpN=e.target.value;render();};})();

/* ---- table browser ---- */
(function(){const wrap=document.getElementById("browse");
  wrap.innerHTML=TABLES.map(t=>`
    <div class="card browse-item" data-kw="${t.no} ${t.title} ${t.kw}">
      <div class="browse-head"><div><span class="no">ตาราง ${t.no}</span>
        <div class="tt">${t.title}</div><div class="sub">${t.sub}</div></div>
        <svg class="chev" width="18" height="18" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none"/></svg></div>
      <div class="browse-body"><table><thead><tr>${t.head.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>
        ${t.note?`<div class="note">${t.note}</div>`:""}</div></div>`).join("");
  wrap.querySelectorAll(".browse-head").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));})();

function showTab(name){document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.tab===name));
  document.getElementById("finder").classList.toggle("hidden",name!=="finder");
  document.getElementById("browse").classList.toggle("hidden",name!=="browse");}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showTab(t.dataset.tab));

/* ---- smart search ---- */
function validSize(sz){const rows=(state.grp==="7"?TRAY[state.ins][state.tray]:CONDUIT[state.ins]).rows;return rows[sz]!==undefined;}
function parseQuery(raw){
  const t=raw.toLowerCase(); const p={}; let route=false, coreSet=false;
  if(/xlpe/.test(t))p.ins="XLPE"; if(/pvc/.test(t))p.ins="PVC";
  if(/(ราง|tray|ladder|บันได|ระบาย)/.test(t)){p.grp="7";route=true;
    p.tray=/(มีฝา|cover|ฝาปิด)/.test(t)?"cover":(/(ทึบ|solid)/.test(t)?"solid_nocover":"vent_nocover");
    if(!/(แกนเดียว|single)/.test(t)){p.core="m";coreSet=true;}
  } else if(/(ท่อ|conduit)/.test(t)){p.grp=/(ผนัง|ฝัง|concrete|wall)/.test(t)?"2":"1";route=true;}
  if(/(แกนเดียว|single)/.test(t)){p.core="s";coreSet=true;}
  if(/(หลายแกน|multi)/.test(t)){p.core="m";coreSet=true;}
  if(/(3\s*(เฟส|phase|ph|φ)|สามเฟส|3p\b)/.test(t))p.cond="3";
  if(/(1\s*(เฟส|phase|ph|φ)|เฟสเดียว|1p\b)/.test(t))p.cond="2";
  let m=t.match(/(\d+(?:\.\d+)?)\s*(?:sq|ตร|mm|มม)/); if(!m)m=t.match(/(?:^|\s)(\d{1,3}(?:\.\d)?)(?:\s|$)/);
  const sizeTok=m?m[1]:null;
  return {p,route,sizeTok,coreSet};
}
document.getElementById("q").addEventListener("input",e=>{
  const raw=e.target.value.trim();
  if(!raw){document.getElementById("banner").classList.remove("on");
    document.querySelectorAll(".browse-item").forEach(i=>i.classList.remove("hidden"));
    document.getElementById("noResult").classList.add("hidden");return;}
  const {p,route,sizeTok}=parseQuery(raw);
  Object.assign(state,p);
  // resolve size against the (possibly new) table
  if(sizeTok&&validSize(sizeTok))state.size=sizeTok;
  const hasAmpIntent = route || (sizeTok&&validSize(sizeTok));
  if(hasAmpIntent){
    showTab("finder");syncUI();render();
    const {base,table}=getBase();
    const b=document.getElementById("banner");b.classList.add("on");
    b.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>
      <span>ผลจากคำค้น: <b>${state.size} ตร.มม.</b> · ${state.ins} · ${getBase().ctx}${base!=null?" → <b>"+base+" A</b>":""} <span style="opacity:.7">(ตาราง ${table} — ปรับตัวเลือกด้านล่างได้)</span></span>`;
  } else {
    document.getElementById("banner").classList.remove("on");
    showTab("browse");
    const toks=raw.toLowerCase().split(/\s+/).filter(x=>x.length>=2);let hits=0;
    document.querySelectorAll(".browse-item").forEach(i=>{
      const kw=i.dataset.kw.toLowerCase();const m=toks.some(x=>kw.includes(x));
      i.classList.toggle("hidden",!m);if(m){hits++;i.classList.add("open");}});
    document.getElementById("noResult").classList.toggle("hidden",hits>0);
  }
});

syncUI();render();
</script>

if('serviceWorker' in navigator){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
